<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZakaPay | Abolishing the 10% Tax</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060f08;
            --primary-green: #00e676;
            --text-white: #f0ede6;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        h1 { color: var(--primary-green); font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }
        .highlight { font-weight: bold; color: var(--primary-green); }
        .btn {
            display: inline-block;
            background-color: var(--primary-green);
            color: var(--bg-color);
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            width: 90%;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ZakaPay</h1>
        <p>Tired of paying <span class="highlight">R10 to withdraw R100?</span></p>
        <p>We are abolishing the 10% informal tax. Send money home for a flat <span class="highlight">R1 fee</span>.</p>
        
        <a href="https://wa.me/message/CCSJNFTTNIHSA1" class="btn">Chat with ZakaPay on WhatsApp</a>
        
        <div class="footer">
            Built for the community. Powered by Stellar. ⚡
        </div>
    </div>
</body>
</html>
